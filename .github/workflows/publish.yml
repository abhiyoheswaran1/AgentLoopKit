name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Use Node 24's bundled npm (11.x) as-is. It supports OIDC trusted
      # publishing and has an intact sigstore module. A global `npm install -g
      # npm@latest` self-upgrade corrupts sigstore ("Cannot find module
      # 'sigstore'") during provenance, so we do NOT self-upgrade npm here.
      - run: npm --version
      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published; skipping npm publish."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "$package_name@$package_version is not published yet."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --access public
        if: steps.npm-version.outputs.published == 'false'
