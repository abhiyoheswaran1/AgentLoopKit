name: Publish MCP Registry

on:
  workflow_run:
    workflows: ['Publish']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-mcp:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      MCP_PUBLISHER_VERSION: v1.7.9
      MCP_PUBLISHER_SHA256_LINUX_AMD64: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
    steps:
      - name: Check out published release commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out current commit
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm package is published
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version

      - name: Install mcp-publisher
        shell: bash
        run: |
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          if [ "$os" != "linux" ] || [ "$arch" != "amd64" ]; then
            echo "Unsupported mcp-publisher platform for pinned checksum: ${os}_${arch}" >&2
            exit 1
          fi
          asset="mcp-publisher_${os}_${arch}.tar.gz"
          curl -fsSLo "$asset" "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${asset}"
          echo "${MCP_PUBLISHER_SHA256_LINUX_AMD64}  ${asset}" | sha256sum --check
          tar xzf "$asset" mcp-publisher
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher

      - name: Authenticate to MCP Registry
        run: mcp-publisher login github-oidc

      - name: Publish server metadata to MCP Registry
        run: mcp-publisher publish
