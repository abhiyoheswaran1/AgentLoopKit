# Optional label map for AgentLoopKit maintainers.
# Apply manually in GitHub, or import with a label-sync tool if the repo chooses one later.

- name: good first issue
  color: "7057ff"
  description: Small, bounded work suitable for a first contribution.

- name: help wanted
  color: "008672"
  description: Maintainers would welcome an external contributor.

- name: docs
  color: "0075ca"
  description: Documentation, examples, guides, or generated prose.

- name: cli
  color: "5319e7"
  description: Command behavior, terminal output, or CLI ergonomics.

- name: templates
  color: "fbca04"
  description: Generated AgentLoopKit loops, gates, policies, agents, or handoffs.

- name: safety
  color: "d93f0b"
  description: Trust, security, destructive-action prevention, or npm package safety.

- name: release
  color: "5319e7"
  description: Versioning, packaging, CI, or npm publishing.

- name: needs verification
  color: "b60205"
  description: Needs a test, build, or verification report before merge.

- name: product-panel
  color: "c5def5"
  description: Internal product-panel, backlog, persona, or dogfood records.
